<!DOCTYPE html>
<HTML lang="en">
    <HEAD>
        <META charset="UTF-8">
        <META name="viewport" content="width=device-width, initial-scale=1.0">
        <TITLE>User access count (IP based)</TITLE>
        <STYLE type='text/css'>
            body { font-family: Arial, sans-serif; padding: 20px; }
            table { border-collapse: collapse; width: 100%; margin-top: 10px; }
            th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
            th { background-color: #f2f2f2; }
            .count-cell { text-align: center; font-family: monospace; font-weight: bold; }
            #status { font-size: 13px; color: #666; margin-bottom: 10px; font-style: italic; }
        </STYLE>
    </HEAD>
    <BODY TOPMARGIN='0' LEFTMARGIN='0'>
        <H3>Visitor Analytics (Real-time)</H3>
        <DIV id="status">Initializing geolocation...</DIV>
        <TABLE>
            <THEAD>
                <TR>
                    <TH>Visits</TH>
                    <TH>Country</TH>
                    <TH>Region</TH>
                    <TH>City</TH>
                    <TH>Continent</TH>
                    <TH>Last Visited</TH>
                </TR>
            </THEAD>
            <TBODY id="tbody"></TBODY>
        </TABLE>

        <SCRIPT type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
            import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

            const firebaseConfig = {
                apiKey: "AIzaSyDSNanmji7WVBtQHlPO-J_E5RQu9Qlq4Qw",
                authDomain: "openmurugesan.firebaseapp.com",
                databaseURL: "https://openmurugesan-default-rtdb.asia-southeast1.firebasedatabase.app",
                projectId: "openmurugesan",
                storageBucket: "openmurugesan.firebasestorage.app",
                messagingSenderId: "307675598593",
                appId: "1:307675598593:web:4af163460ce2c3bc719500"
            };

            const app = initializeApp(firebaseConfig);
            const db = getDatabase(app);
            const tbody = document.getElementById("tbody");
            const statusDiv = document.getElementById("status");

            // 1. Function to capture and store the visit
            async function storeVisit() {
                try {
                    statusDiv.innerText = "Detecting location via IP...";
                    const response = await fetch('https://ipapi.co/json/');
                    const data = await response.json();

                    if(data.error) throw new Error("API Rate Limit or Error");

                    await push(ref(db, "userAccess"), {
                        country: data.country_name || "Unknown",
                        region: data.region || "Unknown",
                        city: data.city || "Unknown",
                        continent: data.continent_code || "??",
                        ip: data.ip || "Hidden",
                        userAgent: navigator.userAgent,
                        timestamp: Date.now()
                    });
                    statusDiv.innerText = `Location verified: ${data.city}, ${data.country_name}`;
                } catch (error) {
                    console.error("Geo-Error:", error);
                    statusDiv.innerText = "Location access failed. Recording anonymous visit.";
                    await push(ref(db, "userAccess"), {
                        country: "Unknown (VPN/Adblock)",
                        timestamp: Date.now()
                    });
                }
            }

            // 2. Date Formatter
            function formatDate(ts) {
                if (!ts || isNaN(ts)) return "N/A";
                const d = new Date(ts);
                const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
                const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
                return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${d.getFullYear()}`;
            }

            // 3. Listen for changes and update the table
            onValue(ref(db, "userAccess"), snapshot => {
                tbody.innerHTML = "";
                if (!snapshot.exists()) return;

                const groups = {};

                snapshot.forEach(child => {
                    const v = child.val();
                    const ts = Number(v.timestamp) || 0;
                    
                    let country = v.country || "Unknown";
                    const region = v.region || "Unknown";
                    const city = v.city || "Unknown";
                    let continent = v.continent || "Unknown";
					switch( country )
					{
						case "United States":
							continent = "North America";
							break;
						case "INDIA":
						case "India":
						case "IN":
							country="India";
							continent = "Asia";
							break;
						case "Asia/Calcutta":
							continent="Asia";
							break;
						case "Asia (Other)":
							continent = "Asia";
							break;
						case "Europe (Other)":
							continent="Europe";
							break;
						case "Ukraine":
							continent = "Europe";
								break;
						case "South Africa":
							continent = "Africa";
								break;
						case "Atlantic":
						case "USA (Atlantic Time Zone)":
						case "USA (Eastern Time Zone)":
						case "USA (Central Time Zone)":
						case "USA (Mountain Time Zone)":
						case "USA (Pacific Time Zone)":
						case "USA (Alaska Time Zone)":
						case "USA (Hawaii-Aleutian Time Zone)":
						case "America/Los_Angeles":
						case "Mexico":
							continent = "North America";
							break;
						case "Africa (Other)":
						case "Cape Verde":
						case "Morocco":
						case "Nigeria":
						case "Egypt":
							continent = "Africa";
							break;
						case "Romania":
						case "Poland":
						case "France":
						case "Hungary":
						case "Germany":
						case "Iceland":
						case "United Kingdom":
						case "Portugal (Azores)":
							continent = "Europe";
							break;

						case "Argentina":
						case "Brazil":
						case "Chile":
						case "Venezuela":
						case "Colombia":
						case "Americas (Other)":
							continent = "South America";
							break;
						case "Pacific Islands":
							continent = "Ausralia/Oceania";
							break;
						default:
							if( "AS" == v.continent )
							{
								continent = "Asia";
							}
					}
                    // Create a unique key for grouping (City + Region + Country)
                    const key = `${country}|${region}|${city}|${continent}`;

                    if (!groups[key]) {
                        groups[key] = { count: 0, lastTs: 0 };
                    }
                    groups[key].count++;
                    if (ts > groups[key].lastTs) groups[key].lastTs = ts;
                });

                // Sort by most recent visit
                Object.keys(groups)
                .sort((a, b) => groups[b].lastTs - groups[a].lastTs)
                .forEach(k => {
                    const [country, region, city, continent] = k.split("|");
                    const row = `
                    <TR>
                        <TD class="count-cell">${String(groups[k].count).padStart(4, "0")}</TD>
                        <TD>${country}</TD>
                        <TD>${region}</TD>
                        <TD>${city}</TD>
                        <TD>${continent}</TD>
                        <TD>${formatDate(groups[k].lastTs)}</TD>
                    </TR>`;
                    tbody.innerHTML += row;
                });
            });

            // Start the process
            storeVisit();
        </SCRIPT>
    </BODY>
</HTML>
