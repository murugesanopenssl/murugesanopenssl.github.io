		<META http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
	<H3>Visitor Analytics (Real-time)</H3>
	<DIV id="status">Initializing geolocation...</DIV>
	<TABLE style='width:100%; border:1px solid #ccc; border-collapse:collapse; margin-top:20px;'>
	<THEAD>
	<TR>
	<TH><A HREF="#" onclick="sortTable('count')"><B><U>VISITS</B></U></A></TH>
	<TH><A HREF="#" onclick="sortTable('country')"><B><U>COUNTRY</B></U></A></TH>
	<TH><A HREF="#" onclick="sortTable('region')"><B><U>REGION</B></U></A></TH>
	<TH><A HREF="#" onclick="sortTable('city')"><B><U>CITY</B></U></A></TH>
	<TH><A HREF="#" onclick="sortTable('continent')"><B><U>CONTINENT</B></U></A></TH>
	<TH><A HREF="#" onclick="sortTable('last')"><B><U>LAST VISITED</B></U></A></TH>
	</TR>
	</THEAD>
	<TBODY id="tbody"></TBODY>
	</TABLE>
	<SCRIPT type="module">
	import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
	import{getDatabase,ref,push,onValue}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
	const firebaseConfig={apiKey:"AIzaSyDSNanmji7WVBtQHlPO-J_E5RQu9Qlq4Qw",authDomain:"openmurugesan.firebaseapp.com",databaseURL:"https://openmurugesan-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"openmurugesan",storageBucket:"openmurugesan.firebasestorage.app",messagingSenderId:"307675598593",appId:"1:307675598593:web:4af163460ce2c3bc719500"};
	const app=initializeApp(firebaseConfig);
	const db=getDatabase(app);
	const tbody=document.getElementById("tbody");
	const statusDiv=document.getElementById("status");
	let sortKey="last";
	let sortDir="desc";
	window.sortTable=function(key){
	if(sortKey===key)sortDir=sortDir==="asc"?"desc":"asc";
	else{sortKey=key;sortDir="asc"}
	render();
	};
	async function storeVisit(){
	try{
	statusDiv.innerText="Detecting location via IP...";
	const r=await fetch("https://ipapi.co/json/");
	const d=await r.json();
	if(d.error)throw new Error();
	await push(ref(db,"userAccess"),{country:d.country_name||"Unknown",region:d.region||"Unknown",city:d.city||"Unknown",continent:d.continent_code||"??",ip:d.ip||"Hidden",userAgent:navigator.userAgent,timestamp:Date.now()});
	statusDiv.innerText=`Location verified:${d.city},${d.country_name}`;
	}catch(e){
	statusDiv.innerText="Location failed. Anonymous visit recorded.";
	await push(ref(db,"userAccess"),{country:"Unknown",timestamp:Date.now()});
	}}
	function formatDate(ts){
	if(!ts)return"N/A";
	const d=new Date(ts);
	const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
	const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
	return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${d.getFullYear()}`;
	}
	let rows=[];
	function render(){
	tbody.innerHTML="";
	let sorted=[...rows];
	sorted.sort((a,b)=>{
	let x=a[sortKey],y=b[sortKey];
	if(sortKey==="count"||sortKey==="last")x=Number(x),y=Number(y);
	else x=(x||"").toString().toLowerCase(),y=(y||"").toString().toLowerCase();
	if(x<y)return sortDir==="asc"?-1:1;
	if(x>y)return sortDir==="asc"?1:-1;
	return 0;
	});
	sorted.forEach(r=>{
	tbody.innerHTML+=`<TR><TD class="count-cell">${String(r.count).padStart(4,"0")}</TD><TD>${r.country}</TD><TD>${r.region}</TD><TD>${r.city}</TD><TD>${r.continent}</TD><TD>${formatDate(r.last)}</TD></TR>`;
	});
	}
	onValue(ref(db,"userAccess"),snap=>{
	if(!snap.exists())return;
	const groups={};
	snap.forEach(c=>{
	const v=c.val();
	const ts=Number(v.timestamp)||0;
	let country=(v.country||"Unknown").trim();
	const region=v.region||"Unknown";
	const city=v.city||"Unknown";
	let continent=v.continent||"Unknown";
	switch( country )
	{
		case "United States":
		case "USA":
			continent="North America";
			break;
		case "INDIA":
		case "India":
		case "IN":
			country="India";
			continent="Asia";
			break;
		case "Asia/Calcutta":
		case "Asia (Other)":
			country = "Unknown";
			continent="Asia";
			break;
		case "Europe (Other)":
			continent="Europe";
			break;
		case "Ukraine":
			continent="Europe";
			break;
		case "South Africa":
			continent="Africa";
			break;
		case "Atlantic":
		case "USA (Atlantic Time Zone)":
		case "USA (Eastern Time Zone)":
		case "USA (Central Time Zone)":
		case "USA (Mountain Time Zone)":
		case "USA (Pacific Time Zone)":
		case "USA (Alaska Time Zone)":
		case "USA (Hawaii-Aleutian Time Zone)":
		case "America/Los_Angeles":
		case "Mexico":
			continent="North America";
			break;
		case "Africa (Other)":
		case "Cape Verde":
		case "Morocco":
		case "Nigeria":
		case "Egypt":
			continent="Africa";
			break;
		case "Romania":
		case "Poland":
		case "France":
		case "Hungary":
		case "Germany":
		case "Iceland":
		case "United Kingdom":
		case "Portugal (Azores)":
			continent="Europe";
			break;
		case "Argentina":
		case "Brazil":
		case "Chile":
		case "Venezuela":
		case "Colombia":
		case "Americas (Other)":
			continent="South America";
			break;
		case "Pacific Islands":
			continent="Oceania";
			break;
		default:
			if( "AS" === v.continent )
			{
				continent="Asia";
			}
			else if( 'undefined' !== typeof v.continent )
			{
				alert(v.continent);
			}
			else if( "Location: UNKNOWN – location for these users is not available due to VPN, proxy, or privacy settings on their device." == v.country)
			{
				continent="Unknown";
			}
	}
	const key=`${country}|${region}|${city}|${continent}`;
	if(!groups[key])groups[key]={country,region,city,continent,count:0,last:0};
	groups[key].count++;
	if(ts>groups[key].last)groups[key].last=ts;
	});
	rows=Object.values(groups);
	render();
	});
	storeVisit();
	</SCRIPT>
	</BODY>
</HTML>
