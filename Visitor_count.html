		<SCRIPT type="module">

				"Europe/Bucharest":        { country: "Romania",        region: "UNKNOWN",      city: "Bucharest",    continent: "Europe" },
				"Europe/Budapest":         { country: "Hungary",        region: "UNKNOWN",      city: "Budapest",     continent: "Europe" },
				"Africa/Cairo":            { country: "Egypt",          region: "UNKNOWN",      city: "Cairo",        continent: "Africa" },
				"Africa/Lagos":            { country: "Nigeria",        region: "UNKNOWN",      city: "Lagos",        continent: "Africa" },
				"Africa/Johannesburg":     { country: "South Africa",   region: "UNKNOWN",      city: "Johannesburg", continent: "Africa" },
				"Africa/Nairobi":          { country: "Kenya",          region: "UNKNOWN",      city: "Nairobi",      continent: "Africa" },
				"Africa/Casablanca":       { country: "Morocco",        region: "UNKNOWN",      city: "Casablanca",   continent: "Africa" },
				"Australia/Sydney":        { country: "Australia",      region: "NSW",          city: "Sydney",       continent: "Oceania" },
				"Australia/Melbourne":     { country: "Australia",      region: "Victoria",     city: "Melbourne",    continent: "Oceania" },
				"Pacific/Auckland":        { country: "New Zealand",    region: "UNKNOWN",      city: "Auckland",     continent: "Oceania" },
			};

			function detectFromTimezone() {
				try {
					const tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
					const lang = navigator.language || "";

					// Direct timezone match
					if (tzMap[tz]) {
						const d = tzMap[tz];
						return { ...d, tz };
					}

					// Partial timezone match (e.g. "Asia/..." → Asia fallback)
					if (tz.startsWith("Asia/"))    return { country: "Asia (Unknown)",    region: "UNKNOWN", city: "UNKNOWN", continent: "Asia",          tz };
					if (tz.startsWith("America/")) return { country: "Americas (Unknown)",region: "UNKNOWN", city: "UNKNOWN", continent: "North America", tz };
					if (tz.startsWith("Europe/"))  return { country: "Europe (Unknown)",  region: "UNKNOWN", city: "UNKNOWN", continent: "Europe",        tz };
					if (tz.startsWith("Africa/"))  return { country: "Africa (Unknown)",  region: "UNKNOWN", city: "UNKNOWN", continent: "Africa",        tz };
					if (tz.startsWith("Pacific/")) return { country: "Pacific (Unknown)", region: "UNKNOWN", city: "UNKNOWN", continent: "Oceania",       tz };
					if (tz.startsWith("Australia/"))return{ country: "Australia",         region: "UNKNOWN", city: "UNKNOWN", continent: "Oceania",       tz };

					return { country: "UNKNOWN", region: "UNKNOWN", city: "UNKNOWN", continent: "Unknown Location", tz };
				} catch(e) {
					return { country: "UNKNOWN", region: "UNKNOWN", city: "UNKNOWN", continent: "Unknown Location", tz: "UNKNOWN" };
				}
			}

			// Try geo API first, fall back to timezone detection
			async function detectLocation() {
				const apis = [
					async () => {
						const r = await fetch("https://ipwho.is/");
						const d = await r.json();
						if (!d.success || !d.country) throw new Error("failed");
						return { country: d.country, region: d.region||"UNKNOWN", city: d.city||"UNKNOWN", continent: d.continent||"UNKNOWN", ip: d.ip };
					},
					async () => {
						const r = await fetch("https://freeipapi.com/api/json");
						const d = await r.json();
						if (!d.countryName) throw new Error("failed");
						return { country: d.countryName, region: d.regionName||"UNKNOWN", city: d.cityName||"UNKNOWN", continent: d.continent||"UNKNOWN", ip: d.ipAddress };
					}
				];

				for (let i = 0; i < apis.length; i++) {
					try {
						const raw = await Promise.race([
							apis[i](),
							new Promise((_, reject) => setTimeout(() => reject(new Error("timeout")), 4000))
						]);
						// Normalize continent code if needed
						const cMap = {"AS":"Asia","NA":"North America","EU":"Europe","AF":"Africa","OC":"Oceania","SA":"South America"};
						const continent = cMap[raw.continent] || raw.continent;
						status.textContent = `✔ Location via API-${i+1}: ${raw.country}, ${raw.region}, ${raw.city} [IP: ${raw.ip}]`;
						return { country: raw.country, region: raw.region, city: raw.city, continent, ip: raw.ip };
					} catch(e) {
						console.warn(`API ${i+1} failed:`, e.message);
					}
				}

				// All APIs failed → use browser timezone (works even behind proxy/Apache)
				const tz = detectFromTimezone();
				status.textContent = `✔ Location via Timezone (${tz.tz}): ${tz.country}, ${tz.region}, ${tz.city}`;
				return { country: tz.country, region: tz.region, city: tz.city, continent: tz.continent, ip: "UNKNOWN" };
			}
			async function storeVisit()
			{
				const geo = await detectLocation();
				console.log("Storing visit:", geo);
				await push(ref(db, "userAccess"), {
					country: geo.country,
					region: geo.region,
					city: geo.city,
					continent: geo.continent,
					ip: geo.ip,
					userAgent: navigator.userAgent,
					timestamp: Date.now()
				});
			}
			storeVisit();
			function formatDate(ts)
			{
				const d = new Date(ts);
				const days   = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
				const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
				return `${days[d.getDay()]} ${String(d.getDate()).padStart(2,"0")}-${months[d.getMonth()]}-${d.getFullYear()}`;
			}

			onValue(ref(db, "userAccess"), snapshot => {
				tbody.innerHTML = "";
				if (!snapshot.exists()) return;

				const counts     = {};
				const lastVisited= {};
				const bestRegion = {};
				const bestCity   = {};
				const cMap = {"AS":"Asia","NA":"North America","EU":"Europe","AF":"Africa","OC":"Oceania","SA":"South America","AN":"Antarctica","OS":"Oceania","???":"Unknown Location","UNKNOWN":"Unknown Location"};
				snapshot.forEach(child => {
					const v = child.val();
					let country   = (v.country   || "UNKNOWN").trim();
					let continent = (v.continent || "UNKNOWN").trim();
					const ts = Number(v.timestamp);
					if (!ts) return;
					const key = `${country}|${continent}`;
					counts[key] = (counts[key] || 0) + 1;
					if (!lastVisited[key] || lastVisited[key] < ts)
						lastVisited[key] = ts;
					if (v.region && v.region !== "UNKNOWN") bestRegion[key] = v.region;
					if (v.city   && v.city   !== "UNKNOWN") bestCity[key]   = v.city;
				});
				Object.keys(counts)
					.sort((a, b) => lastVisited[b] - lastVisited[a])
					.forEach(k => {
						const [country, continent] = k.split("|");
						tbody.innerHTML += `<TR>
							<TD align="center">${String(counts[k]).padStart(4,"0")}</TD>
							<TD valign='top' align='right'>${country}</TD>
							<TD valign='top' align='right'>${bestRegion[k] || "UNKNOWN"}</TD>
							<TD valign='top' align='right'>${bestCity[k]   || "UNKNOWN"}</TD>
							<TD valign='top' align='right'>${continent}</TD>
							<TD valign='top' align='right'>${formatDate(lastVisited[k])}</TD>
						</TR>`;
					});
			});
