<!DOCTYPE html>
<HTML lang="en">
<HEAD>
    <META name="keywords" content="murugesan,financial life management ,india savings account awareness">
    <META http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <META http-equiv="Pragma" content="no-cache">
    <META http-equiv="Expires" content="0">
    <META CHARSET="UTF-8">
    <META name="viewport" content="width=device-width, initial-scale=1.0">
    <TITLE>Tamil and Gregorian Calendar</TITLE>
</HEAD>
<BODY TOPMARGIN='0' LEFTMARGIN='0' MARGINHEIGHT='0' MARGINWIDTH='0'>
    <SCRIPT>
        document.addEventListener("DOMContentLoaded", () => {
            populateMonthSelector();
            document.getElementById("monthSelector").addEventListener("change", onMonthChange);
            onMonthChange();

            document.addEventListener('keydown', (event) => {
                const selector = document.getElementById("monthSelector");
                const options = selector.options;
                const currentIndex = selector.selectedIndex;
                if (options.length > 0) {
                    if (event.key === 'ArrowDown') {
                        if (currentIndex < options.length - 1) {
                            selector.selectedIndex = currentIndex + 1;
                            onMonthChange();
                        }
                    } else if (event.key === 'ArrowUp') {
                        if (currentIndex > 0) {
                            selector.selectedIndex = currentIndex - 1;
                            onMonthChange();
                        }
                    }
                }
            });
        });
    </SCRIPT>
    <STYLE type='text/css'>
        body { background-color: #004C8F; color: #FFFFFF; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        h3 { color: #FFFFFF; border-bottom: 2px solid #FF6600; padding-bottom: 10px; }
        #financialResourcesMenu01, #financialResourcesMenu02 {
            background-color: #0066CC !important; color: #FFFFFF !important; border: 2px solid #003D82 !important; border-radius: 5px;
        }
        #financialResourcesMenu01 a, #financialResourcesMenu02 a { color: #FFCC00 !important; font-weight: bold; }
        #financialResourcesMenu01 a:hover, #financialResourcesMenu02 a:hover {
            color: #FF6600 !important; background-color: #003D82; padding: 5px; border-radius: 3px;
        }
        button { background-color: #003D82 !important; color: #FFFFFF !important; border: 2px solid #FF6600 !important; font-weight: bold; }
        button:hover { background-color: #FF6600 !important; color: #FFFFFF !important; border: 2px solid #003D82 !important; }
    </STYLE>
    <DIV style="width:100%;display:block;margin:0;padding:0;">
        <DIV style="display: flex; flex-direction: column; align-items: flex-start; background-color: blue; padding:6px;">
            <TABLE style='width:100%;'>
                <TR>
                    <TD style="color:white;text-align:middle;" colspan='2'>
                        <SELECT id="monthSelector" style="font-weight:bold; margin-bottom:10px;" onchange="onMonthChange()"></SELECT>
                    </TD>
                </TR>
            </TABLE>
            <DIV style="display: flex; justify-content: space-between; width: 100%;">
                <TABLE style='width:100%;' border='1'>
                    <TR>
                        <TD valign='top' align='left' style='width:50%;'>
                            <TABLE style="width: 100%; border: 1px solid #000;" id="tamil-calendar" border='1'>
                                <TBODY>
                                    <CAPTION><STRONG>தமிழ் ஆண்டு/Tamil Calendar</STRONG></CAPTION>
                                    <THEAD>
                                        <TR>
                                            <TH>ஞாயிறு</TH><TH>திங்கள்</TH><TH>செவ்வாய்</TH><TH>புதன்</TH>
                                            <TH>வியாழன்</TH><TH>வெள்ளி</TH><TH>சனி</TH>
                                        </TR>
                                    </THEAD>
                                </TBODY>
                            </TABLE>
                        </TD>
                        <TD valign='top' align='left' style='width:50%;'>
                            <TABLE style="width: 100%; border: 1px solid #000;" border='1' id="gregorian-calendar">
                                <TBODY>
                                    <CAPTION><STRONG>Gregorian Calendar</STRONG></CAPTION>
                                    <THEAD>
                                        <TR>
                                            <TH>Sun</TH><TH>Mon</TH><TH>Tue</TH><TH>Wed</TH>
                                            <TH>Thu</TH><TH>Fri</TH><TH>Sat</TH>
                                        </TR>
                                    </THEAD>
                                </TBODY>
                            </TABLE>
                        </TD>
                    </TR>
                </TABLE>
            </DIV>
        </DIV>
    </DIV>
    <SCRIPT type='text/javascript'>
        const today = new Date();
        const currentYear = today.getFullYear();
        let tamilYear = currentYear + 3102;

        function clearCalendar(tableId) {
            const tbody = document.getElementById(tableId).getElementsByTagName('tbody')[0];
            tbody.innerHTML = "";
        }

        function populateMonthSelector() {
            const selector = document.getElementById("monthSelector");
            selector.innerHTML = "";
            const currentDate = new Date();
            const currentYear = currentDate.getFullYear();
            const currentMonth = currentDate.getMonth();
            let startYear = currentMonth >= 3 ? currentYear : currentYear - 1;
            let startMonth = 3;
            for (let i = 0; i <= (currentYear - startYear) * 12 + currentMonth - startMonth; ++i) {
                const month = (startMonth + i) % 12;
                const year = startYear + Math.floor((startMonth + i) / 12);
                const monthName = new Date(year, month).toLocaleString('default', { month: 'short' });
                const option = document.createElement("option");
                option.value = `${year}-${month}`;
                option.text = `${monthName}-${year}`;
                if ((currentYear === year) && (currentMonth === month)) option.selected = true;
                selector.appendChild(option);
            }
        }

        function onMonthChange() {
            const value = document.getElementById("monthSelector").value;
            const parts = value.split("-");
            const y = parseInt(parts[0]);
            const m = parseInt(parts[1]);
            clearCalendar("gregorian-calendar");
            clearCalendar("tamil-calendar");
            createGregorianCalendar(y, m);
            createTamilCalendar(y, m);
        }

        function createGregorianCalendar(year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const table = document.getElementById('gregorian-calendar').getElementsByTagName('tbody')[0];
            let row = document.createElement('tr');
            for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement('td'));
            for (let day = 1; day <= daysInMonth; day++) {
                const cell = document.createElement('td');
                const MMM = new Date(year, month).toLocaleString('default', { month: 'short' });
                cell.innerHTML = (day < 10 ? "0" : "") + day + "-" + MMM + "-" + year;
                if ((today.getDate() === day) && (today.getMonth() === month) && (today.getFullYear() === year)) {
                    cell.style.backgroundColor = '#00ff00';
                    cell.style.fontWeight = 'bold';
                }
                row.appendChild(cell);
                if ((firstDay + day) % 7 === 0) {
                    table.appendChild(row);
                    row = document.createElement('tr');
                }
            }
            while (row.children.length < 7) row.appendChild(document.createElement('td'));
            table.appendChild(row);
        }

        const tamilMonthRanges = [
            { month: "சித்திரை", start: { month: 3, day: 14 }, end: { month: 4, day: 13 } },
            { month: "வைகாசி", start: { month: 4, day: 14 }, end: { month: 5, day: 14 } },
            { month: "ஆனி", start: { month: 5, day: 15 }, end: { month: 6, day: 14 } },
            { month: "ஆடி", start: { month: 6, day: 15 }, end: { month: 7, day: 14 } },
            { month: "ஆவணி", start: { month: 7, day: 15 }, end: { month: 8, day: 14 } },
            { month: "புரட்டாசி", start: { month: 8, day: 15 }, end: { month: 9, day: 14 } },
            { month: "ஐப்பசி", start: { month: 9, day: 15 }, end: { month: 10, day: 14 } },
            { month: "கார்த்திகை", start: { month: 9, day: 1 }, end: { month: 9, day: 30 } },
            { month: "மார்கழி", start: { month: 10, day: 16 }, end: { month: 11, day: 16 } },
            { month: "தை", start: { month: 11, day: 17 }, end: { month: 0, day: 14 } },
            { month: "மாசி", start: { month: 0, day: 15 }, end: { month: 1, day: 14 } },
            { month: "பங்குனி", start: { month: 1, day: 15 }, end: { month: 2, day: 14 } }
        ];

        function getTamilMonth(date) {
			const tamilMonthRanges = [
				{ month: "சித்திரை", start: { month: 3, day: 14 }, end: { month: 4, day: 13 } },
				{ month: "வைகாசி", start: { month: 4, day: 14 }, end: { month: 5, day: 14 } },
				{ month: "ஆனி", start: { month: 5, day: 15 }, end: { month: 6, day: 14 } },
				{ month: "ஆடி", start: { month: 6, day: 15 }, end: { month: 7, day: 14 } },
				{ month: "ஆவணி", start: { month: 7, day: 15 }, end: { month: 8, day: 14 } },
				{ month: "புரட்டாசி", start: { month: 8, day: 15 }, end: { month: 9, day: 14 } },
				{ month: "ஐப்பசி", start: { month: 9, day: 15 }, end: { month: 10, day: 14 } },
				{ month: "கார்த்திகை", start: { month: 10, day: 15 }, end: { month: 11, day: 15 } },
				{ month: "மார்கழி", start: { month: 11, day: 16 }, end: { month: 0, day: 14 } },
				{ month: "தை", start: { month: 0, day: 15 }, end: { month: 1, day: 14 } },
				{ month: "மாசி", start: { month: 1, day: 15 }, end: { month: 2, day: 14 } },
				{ month: "பங்குனி", start: { month: 2, day: 15 }, end: { month: 3, day: 13 } }
			];

			for (let r of tamilMonthRanges) {
				const s = r.start, e = r.end;
				if (
					(date.getMonth() === s.month && date.getDate() >= s.day) ||
					(date.getMonth() === e.month && date.getDate() <= e.day) ||
					(date.getMonth() > s.month && date.getMonth() < e.month) ||
					(s.month > e.month && (date.getMonth() > s.month || date.getMonth() < e.month)) // handle year wrap
				) {
					return r.month;
				}
			}
			return '';
		}

        function createTamilCalendar(year, month) {
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDay = new Date(year, month, 1).getDay();
            const table = document.getElementById('tamil-calendar').getElementsByTagName('tbody')[0];
            let row = document.createElement('tr');
            for (let i = 0; i < firstDay; i++) row.appendChild(document.createElement('td'));
            for (let day = 1; day <= daysInMonth; day++) {
                const d = new Date(year, month, day);
                let tamilMonth = getTamilMonth(d);
                let tamilDay = day;
                const cell = document.createElement('td');
                cell.innerHTML = (tamilDay < 10 ? "0" : "") + tamilDay + "-" + tamilMonth + "-" + tamilYear;
                if ((today.getDate() === day) && (today.getMonth() === month) && (currentYear === year)) {
                    cell.style.backgroundColor = '#00ff00';
                    cell.style.fontWeight = 'bold';
                }
                row.appendChild(cell);
                if ((firstDay + day) % 7 === 0) {
                    table.appendChild(row);
                    row = document.createElement('tr');
                }
            }
            while (row.children.length < 7) row.appendChild(document.createElement('td'));
            table.appendChild(row);
        }

        populateMonthSelector();
        document.getElementById("monthSelector").addEventListener("change", onMonthChange);
        onMonthChange();
    </SCRIPT>
</BODY>
</HTML>
