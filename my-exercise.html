<SCRIPT type='text/javascript'>
var monthNames=[
'Jan',
'Feb',
'Mar',
'Apr',
'May',
'Jun',
'Jul',
'Aug',
'Sep',
'Oct',
'Nov',
'Dec'
];
var dayNames=[
'Sun',
'Mon',
'Tue',
'Wed',
'Thu',
'Fri',
'Sat'
];
var defaultData=[
{
date:'Tue 19-May-2026',
time:'15 minutes 21 seconds',
sit:'10 seconds',
toeTouch:'0'
},
{
date:'Wed 20-May-2026',
time:'13 minutes 52 seconds',
sit:'10 seconds',
toeTouch:'0'
},
{
date:'Thu 21-May-2026',
time:'21 minutes 41 seconds',
sit:'20 seconds',
toeTouch:'0'
},
{
date:'Fri 22-May-2026',
time:'26 minutes 34 seconds',
sit:'25 seconds',
toeTouch:'0'
},
{
date:'Sat 23-May-2026',
time:'30 minutes 32 seconds',
sit:'30 seconds',
toeTouch:10
}
];
function fillMonthOptions( )
{
var selectObj=document.getElementById(
'monthSelect'
);
var currentDate=new Date( );
var currentYear=currentDate.getFullYear( );
var currentMonth=currentDate.getMonth( );
for( var year=2026; 2035 >= year; ++year)
{
var startMonth=0;
if( 2026 == year )
{
startMonth=4;
}
for( var month=startMonth; 12 > month; ++month)
{
var optionObj=document.createElement(
'OPTION'
);
optionObj.value=
year+
'-'+
( '0'+( month+1 ) ).slice( -2 );
optionObj.text=
monthNames[month]+
'-'+
year;
if(
( currentYear === year ) &&
( currentMonth === month )
)
{
optionObj.selected=true;
}
selectObj.appendChild(
optionObj
);
}
}
}
function getExerciseData( )
{
var data=localStorage.getItem(
'exerciseData'
);
if( null === data )
{
localStorage.setItem(
'exerciseData',
JSON.stringify( defaultData )
);
return defaultData;
}
return JSON.parse( data );
}
function loadTable( )
{
var tbody=document.getElementById(
'exerciseBody'
);
var data=getExerciseData( );
tbody.innerHTML='';
var totalMinutes=0;
var totalSitSeconds=0;
var totalToeTouchCount=0;
for( var i=0; data.length > i; ++i)
{
var timeMatch=data[i].time.match(
/(\d+)\s+minutes?\s+(\d+)\s+seconds?/i
);
if( null !== timeMatch )
{
totalMinutes+=parseInt(
timeMatch[1],
10
);
}
var sitMatch=data[i].sit.match(
/(\d+)\s+seconds?/i
);
if( null !== sitMatch )
{
totalSitSeconds+=parseInt(
sitMatch[1],
10
);
}
totalToeTouchCount+=parseInt(
(
undefined === data[i].toeTouch
?
'0'
:
data[i].toeTouch
),
10
);
}
var totalHours=Math.floor(
totalMinutes/60
);
var remainingMinutes=
totalMinutes%60;
var sitMinutes=Math.floor(
totalSitSeconds/60
);
var remainingSitSeconds=
totalSitSeconds%60;
var summaryRow=document.createElement(
'TR'
);
var summaryTd1=document.createElement(
'TD'
);
var summaryTd2=document.createElement(
'TD'
);
var summaryTd3=document.createElement(
'TD'
);
var summaryTd4=document.createElement(
'TD'
);
DayCnt=data.length;
if( 10 > DayCnt )
{
DayCnt="0"+DayCnt;
}
summaryTd1.innerHTML=
'<B>Date '+
DayCnt+
' days';
summaryTd2.innerHTML=
'<B>Walking time '+
( '0'+totalHours ).slice( -2 )+
' hour '+
( '0'+remainingMinutes ).slice( -2 )+
' minutes';
summaryTd3.innerHTML=
'<B>Sit on Floor '+
( '0'+sitMinutes ).slice( -2 )+
' minute '+
( '0'+remainingSitSeconds ).slice( -2 )+
' seconds';
summaryTd4.innerHTML=
'<B>Standing Toe Touch (left and right sides) count: '+
totalToeTouchCount+
' times';
if( 0 === totalToeTouchCount )
{
summaryTd4.style.backgroundColor='red';
summaryTd4.style.color='white';
}
summaryRow.appendChild(
summaryTd1
);
summaryRow.appendChild(
summaryTd2
);
summaryRow.appendChild(
summaryTd3
);
summaryRow.appendChild(
summaryTd4
);
tbody.appendChild(
summaryRow
);
for( var i=0; data.length > i; ++i)
{
var row=document.createElement(
'TR'
);
var td1=document.createElement(
'TD'
);
var td2=document.createElement(
'TD'
);
var td3=document.createElement(
'TD'
);
var td4=document.createElement(
'TD'
);
td1.innerHTML=data[i].date;
td2.innerHTML=data[i].time;
td3.innerHTML=data[i].sit;
td4.innerHTML=
(
undefined === data[i].toeTouch
?
'0'
:
data[i].toeTouch
);
if(
'0' == td4.innerHTML
)
{
td4.innerHTML="NOT STARTED";
td4.style.backgroundColor='red';
td4.style.color='white';
}
row.appendChild( td1 );
row.appendChild( td2 );
row.appendChild( td3 );
row.appendChild( td4 );
tbody.appendChild( row );
}
}
function saveExerciseData( )
{
var data=getExerciseData( );
var exerciseDate=document.getElementById(
'exerciseDate'
).value;
var exerciseMinutes=parseInt(
document.getElementById(
'exerciseMinutes'
).value,
10
);
var exerciseSeconds=parseInt(
document.getElementById(
'exerciseSeconds'
).value,
10
);
var sitFloorSeconds=parseInt(
document.getElementById(
'sitFloorSeconds'
).value,
10
);
var toeTouchCount=parseInt(
document.getElementById(
'toeTouchCount'
).value,
10
);
var parts=exerciseDate.split( '-' );
var dateObj=new Date(
parseInt( parts[0], 10 ),
parseInt( parts[1], 10 )-1,
parseInt( parts[2], 10 )
);
var formattedDate=
dayNames[dateObj.getDay( )]+
' '+
( '0'+dateObj.getDate( ) ).slice( -2 )+
'-'+
monthNames[dateObj.getMonth( )]+
'-'+
dateObj.getFullYear( );
data.push(
{
date:formattedDate,
time:
exerciseMinutes+
' minutes '+
exerciseSeconds+
' seconds',
sit:
sitFloorSeconds+
' seconds',
toeTouch:
toeTouchCount+''
}
);
localStorage.setItem(
'exerciseData',
JSON.stringify( data )
);
loadTable( );
alert(
'Exercise data saved'
);
}
fillMonthOptions( );
loadTable( );
</SCRIPT>
