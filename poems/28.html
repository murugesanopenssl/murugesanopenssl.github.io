				Things which you dislike,<BR>
				and that which I cherish—<BR>
				The memories of our friendship that surface within me every day—<BR>
				These very lines of mine<BR>
				Reminded me of:<BR>
				What you once gave me—<BR>
				01) regarding websites and Artificial Intelligence using your voice on call;<BR>
				02) And the lines of your greeting:<BR>
				"Happy Tamil New Year!"
			</TD>
