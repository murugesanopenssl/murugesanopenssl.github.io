							<LI><B>ರೂಪಾಯಿಯಲ್ಲಿ ಆಮದು ಬೆಲೆ ಪ್ರಭಾವ:</B> ಭಾರತವು ಬಹುಭಾಗ ಎಲ್‌ಪಿಜಿ ಆಮದು ಮಾಡುತ್ತದೆ. ಯಾವುದೇ ಅಂತರರಾಷ್ಟ್ರೀಯ ಬೆಲೆ ಮತ್ತು ಸಾಗಣೆ ವೆಚ್ಚ ಏರಿಕೆ ನೇರವಾಗಿ ಸಿಲಿಂಡರ್ ಬೆಲೆಯಲ್ಲಿ ತೋರಿಸುತ್ತದೆ。</LI>
						</UL>
						<P>ಚೀನಾ ಅಥವಾ ರಷ್ಯಾ ಸಹಾಯ ಮಾಡಿದರೂ, ಹೆಚ್ಚುವರಿ ಅಪಾಯಗಳು ಮತ್ತು ಸಾಗಣೆ ವೆಚ್ಚಗಳ ಕಾರಣ ಭಾರತ ಹೆಚ್ಚು ವೆಚ್ಚ ಪಾವತಿಸುತ್ತದೆ. ಸ್ಥಳೀಯ ಉತ್ಪಾದನೆ ಮತ್ತು ರಿಯಾಯಿತಿ ಕೆಲವು ಮಟ್ಟಿಗೆ ಸಹಾಯ ಮಾಡುತ್ತದೆ, ಆದರೆ ಆಮದು ದರಗಳು ವಿಶ್ವದ ಸ್ಥಿತಿಗತಿಗಳನ್ನು ಅನುಸರಿಸುತ್ತವೆ。</P>

						<P>ನಿರ್ಣಯ: ಅಂತರರಾಷ್ಟ್ರೀಯ ಸಂಘರ್ಷ ಭಾರತದ ಆಮದು ಎಲ್‌ಪಿಜಿ ವೆಚ್ಚವನ್ನು ಹೆಚ್ಚಿಸುತ್ತದೆ, ಅದರಿಂದ ಕಡಿಮೆ ಮತ್ತು ಮಧ್ಯಮ ವರ್ಗದ ಕುಟುಂಬಗಳು ಹೆಚ್ಚಿನ ಸಿಲಿಂಡರ್ ದರವನ್ನು ಅನುಭವಿಸುತ್ತಾರೆ。</P>`

			function setLanguage(lang)
			{
				var langs=['kannada','tamil','hindi','english'];
				for(var i=0;i<langs.length;i++)
				{
					var el=document.getElementById('lang-'+langs[i]);
					if(langs[i]===lang)
					{
						el.classList.add('disabled');
						el.removeAttribute('href');
					}
					else
					{
						el.classList.remove('disabled');
						el.setAttribute('href','#'+langs[i]);
					}
				}
				document.getElementById('page-title').innerText=contentMap[lang].title;
				document.getElementById('page-heading').innerText=contentMap[lang].heading;
				document.getElementById('language-content').innerHTML=contentMap[lang].content;
			}
			
			// Get language from URL hash or default to tamil
			window.onload=function(){
				var hash = window.location.hash.substring(1);
				var lang = (hash && contentMap[hash]) ? hash : 'tamil';
				setLanguage(lang);
			};
			
			// Handle hash change for browser back/forward
			window.onhashchange = function(){
				var hash = window.location.hash.substring(1);
				if(hash && contentMap[hash]){
					setLanguage(hash);
				}
			};
