<!DOCTYPE html>
<HTML lang="en">
<HEAD>
		<META http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
		<META http-equiv="Expires" content="0">
		<META http-equiv="Pragma" content="no-cache">
<META charset="UTF-8">
<TITLE id="pageTitle"></TITLE>
<STYLE>
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid black; padding: 8px; text-align: left; }
</STYLE>
</HEAD>
<BODY TOPMARGIN='0' LEFTMARGIN='0' MARGINHEIGHT='0' MARGINWIDTH='0'>
<H2 id="pageHeader"></H2>
<TABLE id="examTable">
  <TR>
    <TH valign='top' align='left'>Date IST</TH>
    <TH valign='top' align='left'>Subjects</TH>
  </TR>
</TABLE>
<SCRIPT>
document.addEventListener("DOMContentLoaded", function() {
  // Dynamic current year
  const yyyy = new Date().getFullYear();
  document.getElementById('pageTitle').innerText = `TN 11th Exam Dates ${yyyy}`;
  document.getElementById('pageHeader').innerText = `TN 11th Exam Dates ${yyyy} (Arrear Candidates)`;
  // Exam data: [day, month(0-indexed), subjects]
  const examData = [
    [3, 2, 'Language'],
    [6, 2, 'English'],
    [10, 2, 'Chemistry / Accountancy / Geography'],
    [12, 2, 'Communicative English / Ethics and Indian Culture / Computer Science / Computer Applications / Bio-Chemistry / Advanced Language (Tamil) / Home Science / Political Science / Statistics / Basic Electrical Engineering / Nursing Vocational'],
    [18, 2, 'Physics / Economics / Employability Skills'],
    [24, 2, 'Mathematics / Zoology / Commerce / Micro Biology / Nutrition Dietetics / Textiles & Dress Designing / Food Service Management / Agricultural Science / Nursing (General)'],
    [27, 2, 'Biology / Botany / History / Business Mathematics and Statistics / Basic Electronics Engineering / Basic Civil Engineering / Basic Automobile Engineering / Basic Mechanical Engineering / Textile Technology / Office Management and Secretaryship']
  ];
  const table = document.getElementById('examTable');
  const today = new Date();
  // Format date function
  function formatDate(day, month) {
    const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const date = new Date(yyyy, month, day);
    const dayStr = date.getDate() < 10 ? '0'+date.getDate() : date.getDate();
    return `${days[date.getDay()]} ${dayStr}-${months[month]}-${yyyy}`;
  }
  // Fill table dynamically
  examData.forEach((exam, index) => {
    const [day, month, subjects] = exam;
    const row = table.insertRow(-1);
    const dateCell = row.insertCell(0);
    const subjectCell = row.insertCell(1);
    dateCell.innerText = formatDate(day, month);
    subjectCell.innerText = subjects;
    // Set background color if exam date is past
    const examDate = new Date(yyyy, month, day);
    row.style.backgroundColor = (examDate < today) ? '#00ff00' : '#ffffff';
  });
});
</SCRIPT>
</BODY>
</HTML>
