<!DOCTYPE html>
<HTML lang="en">
	<HEAD>
		<META charset="UTF-8">
		<META name="viewport" content="width=device-width, initial-scale=1.0">
		<TITLE>PPF Sample Prediction</TITLE>
		<STYLE type='text/css'>
			body
			{
				font-family:Arial,sans-serif;
				font-size:14px;
				background-color:#ffffff;
			}
			table
			{
				border-collapse:collapse;
				width:100%;
			}
			td,th
			{
				border:1px solid #999999;
				padding:6px;
				font-size:13px;
			}
			th
			{
				background-color:#f0f0f0;
			}
			select
			{
				padding:4px;
				font-size:14px;
			}
			#graph_area
			{
				width:100%;
				height:500px;
				border:1px solid #999999;
				overflow:auto;
				background-color:#ffffff;
			}
			.graph_row
			{
				position:relative;
				height:34px;
				border-bottom:1px solid #eeeeee;
			}
			.graph_text
			{
				position:absolute;
				left:10px;
				top:8px;
				z-index:2;
				font-size:12px;
				color:#000000;
			}
			.graph_bar
			{
				position:absolute;
				left:220px;
				top:7px;
				height:20px;
				background:linear-gradient(to right,#4a90e2,#0066cc);
				border-radius:3px;
			}
		</STYLE>
	</HEAD>
	<BODY TOPMARGIN='0' LEFTMARGIN='0' MARGINHEIGHT='0' MARGINWIDTH='0'>
		<DIV style='padding:10px;'>
			<TABLE border='1'>
				<TR>
					<TD valign='top' align='left'>
						<B>Select Graph Range:</B>
						<SELECT id='range_select'></SELECT>
					</TD>
				</TR>
			</TABLE>
			<BR>
			<TABLE border='1' id='payment_table'>
				<TR>
					<TH>Date</TH>
					<TH>Amount</TH>
				</TR>
			</TABLE>
			<BR>
			<DIV id='graph_area'></DIV>
		</DIV>
		<SCRIPT type='text/javascript'>
			const payment_data=
			[
				{date:'08-Mar-2024',amount:500},
				{date:'14-Jun-2024',amount:500},
				{date:'03-Jul-2024',amount:1500},
				{date:'01-Aug-2024',amount:500},
				{date:'14-Sep-2024',amount:500},
				{date:'13-Oct-2024',amount:500},
				{date:'06-Nov-2024',amount:500},
				{date:'02-Dec-2024',amount:1000},
				{date:'13-Dec-2024',amount:600},
				{date:'18-Feb-2025',amount:400},
				{date:'04-Apr-2025',amount:500},
				{date:'09-Apr-2025',amount:100},
				{date:'17-Apr-2025',amount:500},
				{date:'30-Apr-2025',amount:100},
				{date:'03-Aug-2025',amount:550},
				{date:'30-Aug-2025',amount:500},
				{date:'01-Oct-2025',amount:550},
				{date:'16-Oct-2025',amount:50},
				{date:'13-Nov-2025',amount:700},
				{date:'05-Dec-2025',amount:200},
				{date:'05-Dec-2025',amount:600},
				{date:'11-Dec-2025',amount:50},
				{date:'21-Jan-2026',amount:600},
				{date:'02-Feb-2026',amount:500},
				{date:'04-Feb-2026',amount:50},
				{date:'01-Mar-2026',amount:500},
				{date:'02-Apr-2026',amount:500},
				{date:'06-May-2026',amount:500}
			];

			const start_year=2024;
			const maturity_year=2039;
			const interest_rate=0.071;

			function fill_table()
			{
				const table=document.getElementById('payment_table');

				for(let i=0;i<payment_data.length;i++)
				{
					const row=table.insertRow(-1);

					const cell1=row.insertCell(0);
					const cell2=row.insertCell(1);

					cell1.innerHTML=payment_data[i].date;
					cell2.innerHTML=payment_data[i].amount.toFixed(2);
				}
			}

			function fill_range()
			{
				const select=document.getElementById('range_select');

				const option_today=document.createElement('OPTION');

				option_today.value='0';
				option_today.text='Till Now Today Date';

				select.appendChild(option_today);

				for(let year=1;year<=(maturity_year-start_year);year++)
				{
					const option=document.createElement('OPTION');

					option.value=year;
					option.text='From Start Date To '+year+' Year';

					select.appendChild(option);
				}

				select.onchange=function()
				{
					draw_graph(parseInt(this.value));
				};
			}

			function add_graph_row(text,value)
			{
				const graph=document.getElementById('graph_area');

				const row=document.createElement('DIV');
				row.className='graph_row';

				const label=document.createElement('DIV');
				label.className='graph_text';
				label.innerHTML=text;

				const bar=document.createElement('DIV');
				bar.className='graph_bar';
				bar.style.width=(value/40)+'px';

				row.appendChild(label);
				row.appendChild(bar);

				graph.appendChild(row);
			}

			function draw_graph(selected_year)
			{
				const graph=document.getElementById('graph_area');

				graph.innerHTML='';

				let total=0;

				for(let i=0;i<payment_data.length;i++)
				{
					total+=payment_data[i].amount;

					add_graph_row(payment_data[i].date+' : '+total.toFixed(2),total);
				}

				if(selected_year===0)
				{
					return;
				}

				let predict_total=total;

				for(let year=1;year<=selected_year;year++)
				{
					predict_total=predict_total+(predict_total*interest_rate);

					add_graph_row('Prediction Year '+(start_year+year)+' : '+predict_total.toFixed(2),predict_total);
				}
			}

			fill_table();
			fill_range();
			draw_graph(0);
		</SCRIPT>
	</BODY>
</HTML>
